<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Reference particles</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
    font-family: system-ui, sans-serif;
    color: #888;
  }
  #stage {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #status {
    position: fixed;
    top: 12px;
    left: 12px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0.6;
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>
<div id="status">loading…</div>
<script>
(async () => {
  const status = document.getElementById("status");
  const canvas = document.getElementById("stage");
  const ctx = canvas.getContext("2d", { alpha: false });

  const res = await fetch("../particles.json");
  if (!res.ok) {
    status.textContent = "failed to load ../particles.json — serve from project root";
    return;
  }
  const data = await res.json();
  const { width: srcW, height: srcH, particles } = data;
  status.textContent = `${particles.length} particles · ${srcW}×${srcH}`;

  // Pre-bake per-particle phase + drift direction so animation is stable.
  const N = particles.length;
  const px = new Float32Array(N);
  const py = new Float32Array(N);
  const pb = new Float32Array(N);
  const phase = new Float32Array(N);
  const driftA = new Float32Array(N); // drift angle
  for (let i = 0; i < N; i++) {
    px[i] = particles[i][0];
    py[i] = particles[i][1];
    pb[i] = particles[i][2];
    // cheap deterministic pseudo-random per index
    phase[i] = ((i * 9301 + 49297) % 233280) / 233280 * Math.PI * 2;
    driftA[i] = ((i * 1103515245 + 12345) % 2147483648) / 2147483648 * Math.PI * 2;
  }

  // Letterbox the source aspect ratio inside the viewport.
  let viewX = 0, viewY = 0, viewW = 0, viewH = 0, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    const cw = window.innerWidth;
    const ch = window.innerHeight;
    canvas.width = Math.floor(cw * dpr);
    canvas.height = Math.floor(ch * dpr);
    canvas.style.width = cw + "px";
    canvas.style.height = ch + "px";
    const srcAspect = srcW / srcH;
    const winAspect = cw / ch;
    if (winAspect > srcAspect) {
      viewH = ch;
      viewW = ch * srcAspect;
      viewX = (cw - viewW) / 2;
      viewY = 0;
    } else {
      viewW = cw;
      viewH = cw / srcAspect;
      viewX = 0;
      viewY = (ch - viewH) / 2;
    }
    viewX *= dpr;
    viewY *= dpr;
    viewW *= dpr;
    viewH *= dpr;
  }
  resize();
  window.addEventListener("resize", resize);

  // Animation parameters.
  const TWINKLE_SPEED = 0.0018;     // rad / ms
  const TWINKLE_DEPTH = 0.35;       // 0..1, fraction of brightness modulated
  const DRIFT_SPEED = 0.00035;      // rad / ms
  const DRIFT_AMP = 0.0009;         // normalized units (~0.9px of source)

  function frame(t) {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#fff";

    const dotSize = Math.max(1, Math.round(dpr));
    for (let i = 0; i < N; i++) {
      const tw = Math.sin(t * TWINKLE_SPEED + phase[i]);
      const alpha = pb[i] * (1 - TWINKLE_DEPTH + TWINKLE_DEPTH * (0.5 + 0.5 * tw));

      const dt = t * DRIFT_SPEED + phase[i];
      const dx = Math.cos(driftA[i]) * Math.sin(dt) * DRIFT_AMP;
      const dy = Math.sin(driftA[i]) * Math.sin(dt) * DRIFT_AMP;

      const sx = viewX + (px[i] + dx) * viewW;
      const sy = viewY + (py[i] + dy) * viewH;

      ctx.globalAlpha = alpha;
      ctx.fillRect(sx, sy, dotSize, dotSize);
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
